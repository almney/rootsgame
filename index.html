<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Welcome to Roots & Feathers Arcade! Play addictive browser farming games, solve puzzle challenges, and collect suns to level up your farm.">
    <meta name="keywords" content="Farming Game, Idle Clicker, Roots and Feathers, Garden Puzzles, Arcade Games">
    <title>Roots & Feathers | Arcade Hub</title>
    <style>
        :root { --primary: #27ae60; --dark: #1a252f; --panel: #2c3e50; --text: #ecf0f1; }
        
        /* منع التحديد والتقريب باللمس في الجوال لحماية الألعاب */
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { background-color: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #162029; padding: 1rem; text-align: center; border-bottom: 3px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* حاوية مرنة تتكيف مع الكمبيوتر والشاشة الجوالة */
        .page-wrapper { display: flex; justify-content: space-between; flex: 1; padding: 15px; gap: 15px; width: 100%; max-width: 1400px; margin: 0 auto; }
        
        /* الإعلانات الجانبية */
        .ad-sidebar { width: 160px; min-width: 160px; background: #162029; border: 1px dashed #3e5871; display: flex; justify-content: center; align-items: center; border-radius: 10px; }
        
        .dashboard { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .main-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .side-panel { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #3e5871; height: fit-content; }
        
        .card { background: var(--panel); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #3e5871; transition: 0.3s; position: relative; }
        .card img.game-icon { width: 70px; height: 70px; object-fit: contain; margin: 10px auto; display: block; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 15px; }
        button:active { transform: scale(0.98); }
        .stat-val { color: var(--primary); font-size: 1.3rem; font-weight: bold; }
        
        .horizontal-ad-box { width: 100%; margin: 10px auto; text-align: center; min-height: 90px; background: #162029; border: 1px dashed #3e5871; display: flex; justify-content: center; align-items: center; border-radius: 8px; font-size: 12px; }

        #game-stage { position: relative; width: 100%; height: 220px; background: #162029; border-radius: 10px; border: 2px inset #3e5871; overflow: hidden; margin-top: 10px; cursor: pointer; }
        .sun-falling { position: absolute; width: 35px; height: 35px; cursor: pointer; animation: fallDown 3.5s linear forwards; z-index: 10; }
        @keyframes fallDown { from { top: -40px; } to { top: 100%; } }
        
        .floating-text { position: absolute; color: #f1c40f; font-weight: bold; font-size: 16px; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 20; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-40px); } }

        /* نافذة المودال المتجاوبة مع الجوال */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-content { background: var(--panel); padding: 30px 20px; border-radius: 20px; text-align: center; position: relative; border: 2px solid var(--primary); width: 100%; max-width: 320px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 5px; right: 15px; font-size: 32px; cursor: pointer; color: #aaa; }
        #ans { padding: 10px; width: 90%; border: 1px solid #3e5871; border-radius: 5px; background: #1a252f; color: white; font-size: 18px; text-align: center; margin-bottom: 15px; }
        
        /* 📱 تعديلات ذكية خاصة بالجوال فقط لتنظيف المظهر 📱 */
        @media (max-width: 768px) {
            .ad-sidebar { display: none; } /* إخفاء الإعلانات العمودية لأنها تدمر الجوال */
            .page-wrapper { padding: 10px; flex-direction: column; }
            .main-panel { grid-template-columns: 1fr; } /* الألعاب تترتب تحت بعض بشكل رائع */
            .card[style*="grid-column"] { grid-column: auto !important; }
            header h1 { font-size: 20px; }
            .horizontal-ad-box { max-width: 100%; min-height: 50px; } /* تصغير مساحة البنرات لتناسب شاشة الموبايل */
        }
    </style>
</head>
<body>

            <div class="card">
                <h3>Farm Clicker</h3>
                <img class="game-icon" src="https://i.ibb.co/v3m6YxG/plant-icon.png" onerror="this.src='https://cdn-icons-png.flaticon.com/128/188/188333.png'" alt="Plant">

<div id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="UI.closeModal()">&times;</span>
        <h3>Garden Math</h3>
        <p id="mathQ" style="font-size: 20px; font-weight: bold; margin: 15px 0;"></p>
        <input type="number" id="ans" inputmode="numeric" placeholder="Enter answer">
        <button onclick="Game.checkMath()">Submit & Verify</button>
    </div>
</div>

<script>
    const Game = {
        state: { coins: 0, lvl: 1, puzzles: 0, pwr: 1, upgradeCost: 500, upgradeClicks: 0 },
        currentAnswer: 0,
        
        loadState() {
            let data = localStorage.getItem('arcadeData');
            if (data) {
                try {
                    let parsed = JSON.parse(data);
                    this.state.coins = isNaN(parsed.coins) || parsed.coins === undefined ? 0 : parsed.coins;
                    this.state.lvl = isNaN(parsed.lvl) || parsed.lvl === undefined ? 1 : parsed.lvl;
                    this.state.puzzles = isNaN(parsed.puzzles) || parsed.puzzles === undefined ? 0 : parsed.puzzles;
                    this.state.pwr = isNaN(parsed.pwr) || parsed.pwr === undefined ? 1 : parsed.pwr;
                    this.state.upgradeCost = isNaN(parsed.upgradeCost) || parsed.upgradeCost === undefined ? 500 : parsed.upgradeCost;
                    this.state.upgradeClicks = isNaN(parsed.upgradeClicks) || parsed.upgradeClicks === undefined ? 0 : parsed.upgradeClicks;
                } catch(e) { console.log("Resetting corrupted data"); }
            }
        },
        init() { this.loadState(); UI.refresh(); },
        clicker() { this.state.coins += (1 * this.state.pwr); UI.refresh(); },
        
        triggerSunDrop(event) {
            if (event.target.classList.contains('sun-falling')) return;
            let stage = document.getElementById('game-stage');
            let count = Math.floor(Math.random() * 3) + 2; 
            
            for (let i = 0; i < count; i++) {
                let sun = document.createElement('img');
                sun.src = 'https://cdn-icons-png.flaticon.com/128/869/869869.png';
                sun.className = 'sun-falling';
                sun.style.left = Math.random() * 85 + '%';
                sun.style.animationDuration = (Math.random() * 1.2 + 1.8) + 's'; 
                
                let harvest = function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    Game.state.coins += (10 * Game.state.pwr);
                    
                    let text = document.createElement('span');
                    text.className = 'floating-text';
                    text.innerText = '+' + (10 * Game.state.pwr);
                    text.style.left = sun.style.left;
                    text.style.top = sun.offsetTop + 'px';
                    stage.appendChild(text);
                    setTimeout(() => text.remove(), 800);
                    
                    UI.refresh();
                    sun.remove();
                };
                
                sun.ontouchstart = harvest;
                sun.onclick = harvest;
                
                stage.appendChild(sun);
                setTimeout(() => { if(sun.parentNode) sun.remove(); }, 3500);
            }
        },
        
        generateMathProblem() {
            let num1 = Math.floor(Math.random() * 30) + 10;
            let num2 = Math.floor(Math.random() * 30) + 10;
            this.currentAnswer = num1 + num2;
            document.getElementById('mathQ').innerText = `What is ${num1} + ${num2}?`;
            document.getElementById('ans').value = '';
        },
        checkMath() {
            let userAnswer = document.getElementById('ans').value;
            if (userAnswer == this.currentAnswer) {
                this.state.coins += 200;
                this.state.puzzles++;
                UI.closeModal();
                UI.refresh();
            } else { alert("Incorrect answer!"); }
        },
        
        upgrade() {
            if (this.state.coins >= this.state.upgradeCost) {
                this.state.coins -= this.state.upgradeCost;
                this.state.pwr++;
                this.state.upgradeCost = this.state.upgradeCost * 2;
                
                // 💰 5. إعلان المنبثق الذكي يفتح في صفحة جديدة كل 3 ضغطات
                this.state.upgradeClicks++;
                if (this.state.upgradeClicks >= 3) {
                    this.state.upgradeClicks = 0;
                    window.open('https://www.effectivecpmnetwork.com/s6sa7816ba?key=774efd03db269bcb7bc88442967b8fdc', '_blank');
                    
                }
                UI.refresh();
            } else { alert(`You need ${this.state.upgradeCost} coins!`); }
        }
    };

    const UI = {
        refresh() {
            Game.state.lvl = Math.floor(Game.state.coins / 1000) + 1;
            document.getElementById('balance').innerText = Math.floor(Game.state.coins);
            document.getElementById('lvl').innerText = Game.state.lvl;
            document.getElementById('puzzCount').innerText = Game.state.puzzles;
            document.getElementById('pwr').innerText = Game.state.pwr;
            document.getElementById('prog').value = Game.state.coins % 1000;
            document.getElementById('btn-upgrade').innerText = `Upgrade Farm (Cost ${Game.state.upgradeCost})`;
            localStorage.setItem('arcadeData', JSON.stringify(Game.state));
        },
        openModal() { Game.generateMathProblem(); document.getElementById('modal').style.display = 'flex'; },
        closeModal() { document.getElementById('modal').style.display = 'none'; }
    };
    
    Game.init();
</script>
