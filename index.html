<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Welcome to Roots & Feathers Arcade! Play addictive browser farming games, solve puzzle challenges, and collect suns to level up your farm.">
    <meta name="keywords" content="Farming Game, Idle Clicker, Roots and Feathers, Garden Puzzles, Arcade Games">
    <title>Roots & Feathers | Arcade Hub</title>
    <style>
        :root { --primary: #27ae60; --dark: #1a252f; --panel: #2c3e50; --text: #ecf0f1; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #162029; padding: 1.5rem; text-align: center; border-bottom: 3px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .dashboard { display: flex; flex: 1; padding: 20px; gap: 20px; flex-wrap: wrap; }
        .main-panel { flex: 3; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; align-content: start; }
        .side-panel { flex: 1; min-width: 280px; background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #3e5871; height: fit-content; }
        .card { background: var(--panel); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #3e5871; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card img.game-icon { width: 80px; height: 80px; object-fit: contain; margin: 10px auto; display: block; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #219150; }
        .stat-val { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
        
        /* صندوق لعبة تساقط الشموس التفاعلي */
        #game-stage { position: relative; width: 100%; height: 250px; background: #162029; border-radius: 10px; border: 2px inset #3e5871; overflow: hidden; margin-top: 15px; cursor: pointer; }
        .sun-falling { position: absolute; width: 40px; height: 40px; cursor: pointer; animation: fallDown 3.5s linear forwards; z-index: 10; user-select: none; }
        @keyframes fallDown { from { top: -50px; } to { top: 100%; } }
        
        /* تأثير ظهور رقم الحصاد عند اللمس (+10) */
        .floating-text { position: absolute; color: #f1c40f; font-weight: bold; font-size: 18px; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 20; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-40px); } }

        /* نافذة البازل (المودال) الاحترافية */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: var(--panel); padding: 40px; border-radius: 20px; text-align: center; position: relative; border: 2px solid var(--primary); width: 300px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #aaa; transition: 0.2s; }
        .close-btn:hover { color: white; }
        #ans { padding: 10px; width: 80%; border: 1px solid #3e5871; border-radius: 5px; background: #1a252f; color: white; font-size: 18px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <h1>🌱 Roots & Feathers Arcade</h1>
    <div style="font-size: 1.2rem;">Coins: <span id="balance" class="stat-val">0</span> | Level: <span id="lvl" class="stat-val">1</span></div>
</header>

<div class="dashboard">
    <div class="main-panel">
        <div class="card">
            <h3>Farm Clicker</h3>
            <img class="game-icon" src="https://i.ibb.co/v3m6YxG/plant-icon.png" onerror="this.src='https://cdn-icons-png.flaticon.com/128/188/188333.png'" alt="Plant">
            <button onclick="Game.clicker()">Plant & Harvest</button>
        </div>
        
        <div class="card">
            <h3>Math Roots</h3>
            <img class="game-icon" src="https://i.ibb.co/TMjPtcC/puzzle-icon.png" onerror="this.src='https://cdn-icons-png.flaticon.com/128/3094/3094223.png'" alt="Puzzle">
            <button onclick="UI.openModal()">Solve Challenge</button>
        </div>
        
        <div class="card" style="grid-column: span 2;">
            <h3>Sun Collector</h3>
            <p style="margin: 0; color: #bdc3c7; font-size: 14px;">Click inside the box to drop suns, then catch them quickly!</p>
            <div id="game-stage" onclick="Game.triggerSunDrop(event)"></div>
        </div>
    </div>

    <div class="side-panel">
        <h3>🏆 Stats & Goals</h3>
        <p>Total Puzzles Solved: <span id="puzzCount">0</span></p>
        <p>Global Power: <span id="pwr">1</span>x</p>
        <hr style="border: 0; border-top: 1px solid #3e5871;">
        <p>Next Level Progress:</p>
        <progress id="prog" value="0" max="1000" style="width:100%; height:20px; border-radius: 5px; overflow: hidden;"></progress>
        <button id="btn-upgrade" style="background: #e67e22;" onclick="Game.upgrade()">Upgrade Farm (Cost 500)</button>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="UI.closeModal()">&times;</span>
        <h3>Garden Math</h3>
        <p id="mathQ" style="font-size: 20px; font-weight: bold; margin: 20px 0;"></p>
        <input type="number" id="ans" placeholder="Enter answer">
        <button onclick="Game.checkMath()">Submit & Verify</button>
    </div>
</div>

<script>
    const Game = {
        // أضفنا سعر الـ upgrade كقيمة أساسية تبدأ من 500
        state: { coins: 0, lvl: 1, puzzles: 0, pwr: 1, upgradeCost: 500 },
        currentAnswer: 0,
        
        loadState() {
            let data = localStorage.getItem('arcadeData');
            if (data) {
                try {
                    let parsed = JSON.parse(data);
                    this.state.coins = isNaN(parsed.coins) || parsed.coins === undefined ? 0 : parsed.coins;
                    this.state.lvl = isNaN(parsed.lvl) || parsed.lvl === undefined ? 1 : parsed.lvl;
                    this.state.puzzles = isNaN(parsed.puzzles) || parsed.puzzles === undefined ? 0 : parsed.puzzles;
                    this.state.pwr = isNaN(parsed.pwr) || parsed.pwr === undefined ? 1 : parsed.pwr;
                    // تحميل السعر المخزن أو وضع 500 كقيمة افتراضية إذا لم يكن مخزناً
                    this.state.upgradeCost = isNaN(parsed.upgradeCost) || parsed.upgradeCost === undefined ? 500 : parsed.upgradeCost;
                } catch(e) {
                    console.log("Resetting corrupted data");
                }
            }
        },
        
        init() {
            this.loadState();
            UI.refresh();
        },
        
        clicker() {
            this.state.coins += (1 * this.state.pwr);
            UI.refresh();
        },
        
        triggerSunDrop(event) {
            if (event.target.classList.contains('sun-falling')) return;
            let stage = document.getElementById('game-stage');
            let count = Math.floor(Math.random() * 4) + 3;
            
            for (let i = 0; i < count; i++) {
                let sun = document.createElement('img');
                sun.src = 'https://cdn-icons-png.flaticon.com/128/869/869869.png';
                sun.className = 'sun-falling';
                sun.style.left = Math.random() * 90 + '%';
                sun.style.animationDuration = (Math.random() * 1.5 + 2) + 's'; 
                
                sun.onclick = function(e) {
                    e.stopPropagation();
                    Game.state.coins += (10 * Game.state.pwr);
                    
                    let text = document.createElement('span');
                    text.className = 'floating-text';
                    text.innerText = '+' + (10 * Game.state.pwr);
                    text.style.left = sun.style.left;
                    text.style.top = sun.offsetTop + 'px';
                    stage.appendChild(text);
                    setTimeout(() => text.remove(), 800);
                    
                    UI.refresh();
                    this.remove();
                };
                
                stage.appendChild(sun);
                setTimeout(() => { if(sun.parentNode) sun.remove(); }, 3500);
            }
        },
        
        generateMathProblem() {
            let num1 = Math.floor(Math.random() * 40) + 10;
            let num2 = Math.floor(Math.random() * 40) + 10;
            this.currentAnswer = num1 + num2;
            document.getElementById('mathQ').innerText = `What is ${num1} + ${num2}?`;
            document.getElementById('ans').value = '';
        },
        
        checkMath() {
            let userAnswer = document.getElementById('ans').value;
            if (userAnswer == this.currentAnswer) {
                this.state.coins += 200;
                this.state.puzzles++;
                UI.closeModal();
                UI.refresh();
            } else {
                alert("Incorrect answer! Please study the soil and try again.");
            }
        },
        
        // تعديل دالة التطوير لمضاعفة السعر تلقائياً عند الشراء
        upgrade() {
            if (this.state.coins >= this.state.upgradeCost) {
                this.state.coins -= this.state.upgradeCost;
                this.state.pwr++;
                this.state.upgradeCost = this.state.upgradeCost * 2; // هنا يتضاعف السعر (500 -> 1000 -> 2000)
                UI.refresh();
            } else {
                alert(`You need ${this.state.upgradeCost} coins to upgrade your tools!`);
            }
        }
    };

    const UI = {
        refresh() {
            Game.state.lvl = Math.floor(Game.state.coins / 1000) + 1;
            
            document.getElementById('balance').innerText = Math.floor(Game.state.coins);
            document.getElementById('lvl').innerText = Game.state.lvl;
            document.getElementById('puzzCount').innerText = Game.state.puzzles;
            document.getElementById('pwr').innerText = Game.state.pwr;
            document.getElementById('prog').value = Game.state.coins % 1000;
            
            // تحديث نص الزر ليعرض السعر الحالي المتضاعف بشكل صحيح
            document.getElementById('btn-upgrade').innerText = `Upgrade Farm (Cost ${Game.state.upgradeCost})`;
            
            localStorage.setItem('arcadeData', JSON.stringify(Game.state));
        },
        openModal() {
            Game.generateMathProblem();
            document.getElementById('modal').style.display = 'flex';
        },
        closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    };
    
    Game.init();
</script>
</body>
</html>
